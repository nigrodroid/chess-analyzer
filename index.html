<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Analyzer &amp; Reviewer Pro</title>
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="board-column">
    <div class="eval-bar-container">
      <div id="evalBarFill" class="eval-bar-fill"></div>
      <div id="evalBarLabel" class="eval-bar-label">0.0</div>
    </div>
    <div class="board-wrapper">
      <div id="board"></div>
      <svg id="arrowSvg"></svg>
    </div>
  </div>

  <div class="panel-column">
    <div class="coach-bubble" id="coachBubble">
      <div class="coach-avatar"></div>
      <div class="coach-text-content">
        <span class="coach-title" id="coachTitle">Ready for Analysis</span>
        <p class="coach-text" id="coachText">Paste your PGN below to generate a detailed review of your game's accuracy and turning points.</p>
      </div>
    </div>

    <div class="tabs-header">
      <button class="tab-btn active" id="tabReviewBtn">⚡ Game Review</button>
      <button class="tab-btn" id="tabAnalysisBtn">📋 Move List</button>
    </div>

    <div class="setup-box" id="setupBox">
      <textarea id="pgnInput" placeholder="[Event &quot;Live Chess&quot;]... Paste your PGN data here..."></textarea>
      <button id="analyzeBtn">Analyze Game</button>
      <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
    </div>

    <div class="tab-content" id="tabContent">
      
      <div class="summary-card" id="summaryCard" style="display: none;">
        <div class="accuracy-header-row">
          <div class="accuracy-block">
            <div class="square-badge white-square"></div>
            <div class="acc-meta">
              <span class="player-lbl">White Accuracy</span>
              <span class="acc-val" id="whiteAccuracy">0.0%</span>
            </div>
          </div>
          <div class="accuracy-block">
            <div class="square-badge black-square"></div>
            <div class="acc-meta">
              <span class="player-lbl">Black Accuracy</span>
              <span class="acc-val" id="blackAccuracy">0.0%</span>
            </div>
          </div>
        </div>

        <div class="rating-header-row">
          <div class="rating-block">
            <span class="rating-lbl">White Rating Performance</span>
            <span class="rating-val" id="whiteRating">1200</span>
          </div>
          <div class="rating-block">
            <span class="rating-lbl">Black Rating Performance</span>
            <span class="rating-val" id="blackRating">1200</span>
          </div>
        </div>

        <table class="breakdown-table">
          <tbody id="breakdown-body">
            </tbody>
        </table>

        <div class="phase-container">
          <div class="phase-row">
            <span class="phase-lbl">Opening</span>
            <span class="phase-status check-icon">✓</span>
          </div>
          <div class="phase-row">
            <span class="phase-lbl">Middle Game</span>
            <span class="phase-status status-dash">-</span>
          </div>
          <div class="phase-row">
            <span class="phase-lbl">Endgame</span>
            <span class="phase-status status-dash">-</span>
          </div>
        </div>
      </div>

      <div id="results" style="display: none;"></div>
    </div>

    <div class="nav-controls">
      <button class="nav-btn" id="btnFirst" title="First">⏮</button>
      <button class="nav-btn" id="btnPrev" title="Previous">◀</button>
      <button class="nav-btn" id="btnPlay" title="Play/Pause">▶</button>
      <button class="nav-btn" id="btnNext" title="Next">▶</button>
      <button class="nav-btn" id="btnLast" title="Last">⏭</button>
      <button class="nav-btn" id="btnFlip" title="Flip Board">⇅</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
