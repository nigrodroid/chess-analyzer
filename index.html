<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Analyzer &amp; Reviewer</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="board-column">
    <div id="board"></div>
    <canvas id="arrowCanvas"></canvas>
  </div>

  <div class="panel-column">
    <h2>Game Review</h2>
    <textarea id="pgnInput" placeholder="Paste your PGN here..."></textarea>
    <button id="analyzeBtn">Analyze Game</button>

    <div class="progress-wrapper" id="progressWrapper">
      <div class="progress-bar" id="progressBar"></div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="summary-card" id="summaryCard">
      <div class="stat-row">
        <div class="stat-side">
          <div class="stat-label">White Accuracy</div>
          <div class="stat-val" id="whiteAccuracy">0.0%</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-side">
          <div class="stat-label">Black Accuracy</div>
          <div class="stat-val" id="blackAccuracy">0.0%</div>
        </div>
      </div>
      <hr>
      <table class="breakdown-table">
        <thead>
          <tr><td>Classification</td><td class="ctr">White</td><td class="ctr">Black</td></tr>
        </thead>
        <tbody id="breakdown-body"></tbody>
      </table>
    </div>

    <div id="results">Loading engine...</div>

    <div class="nav-controls">
      <button class="nav-btn" id="btnFirst" title="First">⏮</button>
      <button class="nav-btn" id="btnPrev" title="Previous">◀</button>
      <button class="nav-btn" id="btnPlay" title="Play/Pause">▶</button>
      <button class="nav-btn" id="btnNext" title="Next">▶</button>
      <button class="nav-btn" id="btnLast" title="Last">⏭</button>
      <button class="nav-btn" id="btnFlip" title="Flip board">⇅</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
