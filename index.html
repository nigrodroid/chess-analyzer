<body>

<div class="container">
    <div class="board-column">
        <div id="board"></div>
    </div>
    
    <div class="panel-column">
        <h2>Game Review</h2>
        <textarea id="pgnInput" placeholder="Paste your PGN here..."></textarea>
        <button id="analyzeBtn">Analyze Game</button>
        
        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div id="results">Loading engine setup...</div>
    </div>
</div>

<script>
    // Initialize Board with Fixed Image URL
    let board = Chessboard('board', {
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        position: 'start'
    });

    const game = new Chess();
    let stockfishWorker = null;
    let isAnalyzing = false;

    // Load Stockfish Engine via Blob to avoid security blocks
    async function loadStockfish() {
        try {
            document.getElementById('results').innerHTML = "<div style='padding:15px; text-align:center;'>Setting up engine...</div>";
            const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
            const code = await response.text();
            const blob = new Blob([code], { type: 'application/javascript' });
            stockfishWorker = new Worker(URL.createObjectURL(blob));
            document.getElementById('results').innerHTML = "<div style='padding:15px; text-align:center; color:#81b64c;'>Ready for analysis.</div>";
        } catch (error) {
            document.getElementById('results').innerHTML = "<div style='padding:15px; text-align:center; color:#ff5555;'>Engine error.</div>";
        }
    }

    loadStockfish();

    // Analysis Logic
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
        const pgn = document.getElementById('pgnInput').value.trim();
        const resultsDiv = document.getElementById('results');
        
        if (!pgn) { alert("Paste a PGN first!"); return; }
        if (!stockfishWorker) { alert("Engine is loading..."); return; }
        if (isAnalyzing) return;
        
        game.reset();
        if (!game.load_pgn(pgn)) {
            resultsDiv.innerHTML = "<div style='padding:15px; color:#ff5555;'>Invalid PGN format.</div>";
            return;
        }

        const moves = game.history({ verbose: true });
        if (moves.length === 0) return;

        isAnalyzing = true;
        document.getElementById('analyzeBtn').disabled = true;
        
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        progressWrapper.style.display = 'block';
        resultsDiv.innerHTML = "";
        
        let testGame = new Chess();
        
        for (let i = 0; i < moves.length; i++) {
            let percent = Math.round(((i + 1) / moves.length) * 100);
            progressBar.style.width = percent + '%';
            progressText.innerText = `Analyzing (${percent}%)`;
            
            testGame.move(moves[i]);
            board.position(testGame.fen());
            
            const evalValue = await getEval(testGame.fen(), 10);
            
            const moveDiv = document.createElement('div');
            moveDiv.className = 'move-eval';
            const whiteToMove = i % 2 === 0;
            const turnNum = Math.floor(i / 2) + 1;
            const movePrefix = whiteToMove ? `${turnNum}. ` : `${turnNum}... `;
            
            moveDiv.innerHTML = `<span class="move-text">${movePrefix}${moves[i].san}</span> <span class="eval-badge">${evalValue}</span>`;
            resultsDiv.appendChild(moveDiv);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }
        
        progressText.innerText = "Complete!";
        isAnalyzing = false;
        document.getElementById('analyzeBtn').disabled = false;
    });

    function getEval(fen, depth) {
        return new Promise((resolve) => {
            let currentEval = "0.00";
            const onMessage = (event) => {
                const line = event.data;
                if (line.includes('score cp')) {
                    const match = line.match(/score cp (-?\d+)/);
                    if (match) {
                        let score = parseInt(match[1]) / 100;
                        if (fen.includes(' b ')) score = -score;
                        currentEval = (score > 0 ? '+' : '') + score.toFixed(2);
                    }
                } else if (line.includes('score mate')) {
                    const match = line.match(/score mate (-?\d+)/);
                    if (match) {
                        let mate = parseInt(match[1]);
                        if (fen.includes(' b ')) mate = -mate;
                        currentEval = `M${mate}`;
                    }
                }
                if (line.startsWith('bestmove')) {
                    stockfishWorker.removeEventListener('message', onMessage);
                    resolve(currentEval);
                }
            };
            stockfishWorker.addEventListener('message', onMessage);
            stockfishWorker.postMessage('position fen ' + fen);
            stockfishWorker.postMessage('go depth ' + depth);
        });
    }
</script>
