<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chess Review Engine Pro+</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; background:#0f1115; color:#fff; font-family:system-ui; display:flex; justify-content:center; padding:20px; }
.container { display:flex; gap:20px; max-width:1200px; width:100%; }
.board-wrap { position:relative; }
#board { width:480px; }
#arrowCanvas { position:absolute; top:0; left:0; width:480px; height:480px; pointer-events:none; }

.panel { flex:1; background:#161b22; padding:12px; border-radius:8px; display:flex; flex-direction:column; gap:10px; }

textarea { width:100%; height:80px; background:#0d1117; color:#fff; border:1px solid #333; border-radius:6px; }

button { background:#2ea44f; border:none; padding:10px; font-weight:bold; border-radius:6px; cursor:pointer; }

.moves { max-height:260px; overflow:auto; background:#0d1117; border-radius:6px; }

.move { display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222; cursor:pointer; }

.badge { padding:3px 6px; font-size:11px; border-radius:4px; font-weight:bold; }

.best{background:#2ea44f;}
.good{background:#5c8bb0;}
.inacc{background:#d5a43f; color:#000;}
.mistake{background:#e67e22;}
.blunder{background:#b33925;}
.book{background:#81b64c;}
</style>
</head>

<body>

<div class="container">

<div class="board-wrap">
<div id="board"></div>
<canvas id="arrowCanvas"></canvas>
</div>

<div class="panel">

<h3>Chess Review Engine PRO+</h3>

<textarea id="pgn">1. e4 e5 2. Nf3 Nc6 3. Bc4 Bc5 4. c3 Nf6 5. d4 exd4 6. cxd4 Bb4+</textarea>
<button id="run">Analyze Game</button>

<canvas id="chart" height="120"></canvas>

<div class="moves" id="moves"></div>

</div>
</div>

<script>
const game = new Chess();
let board;
let engine;
let cache = new Map();
let chart;

// ---------------- ENGINE ----------------
function initEngine(){
    engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js");
}

function analyze(fen, depth=12, multipv=3){
    if(cache.has(fen)) return Promise.resolve(cache.get(fen));

    return new Promise(resolve=>{
        let best = null;
        let evalScore = 0;

        engine.onmessage = (e)=>{
            const l = e.data;

            if(l.includes("score cp")){
                let m = l.match(/score cp (-?\d+)/);
                if(m) evalScore = parseInt(m[1]) / 100;
            }

            if(l.includes("score mate")){
                let m = l.match(/score mate (-?\d+)/);
                if(m) evalScore = m[1] > 0 ? 10 : -10;
            }

            if(l.startsWith("bestmove")){
                best = l.split(" ")[1];

                let from = best?.slice(0,2);
                let to = best?.slice(2,4);

                let san = "";
                try{
                    let t = new Chess(fen);
                    let mv = t.move({from,to,promotion:"q"});
                    san = mv?.san || "";
                }catch{}

                const result = {eval:evalScore, bestMove:best, from, to, san};
                cache.set(fen,result);
                resolve(result);
            }
        };

        engine.postMessage("uci");
        engine.postMessage("setoption name MultiPV value " + multipv);
        engine.postMessage("position fen " + fen);
        engine.postMessage("go depth " + depth);
    });
}

// ---------------- CLASSIFICATION (REALISTIC) ----------------
function classify(prev, curr){

    let a = typeof prev==="string"?0:prev;
    let b = typeof curr==="string"?0:curr;

    let loss = Math.abs(a-b);

    if(loss < 0.05) return {label:"BEST", cls:"best"};
    if(loss < 0.15) return {label:"GOOD", cls:"good"};
    if(loss < 0.4) return {label:"INACCURACY", cls:"inacc"};
    if(loss < 1.2) return {label:"MISTAKE", cls:"mistake"};
    return {label:"BLUNDER", cls:"blunder"};
}

// ---------------- MAIN ----------------
document.getElementById("run").onclick = async ()=>{

    game.reset();
    let pgn = document.getElementById("pgn").value;

    if(!game.load_pgn(pgn)) return alert("Invalid PGN");

    let hist = game.history({verbose:true});
    let virtual = new Chess();

    let prevEval = 0;
    let vals = [];
    let labels = [];

    document.getElementById("moves").innerHTML = "";

    for(let i=0;i<hist.length;i++){

        let fen = virtual.fen();
        let data = await analyze(fen);

        virtual.move(hist[i]);

        let cls = classify(prevEval, data.eval);
        prevEval = data.eval;

        labels.push(i);
        vals.push(data.eval);

        let div = document.createElement("div");
        div.className="move";
        div.innerHTML = `
            <span>${hist[i].san}</span>
            <span class="badge ${cls.cls}">${cls.label}</span>
        `;

        div.onclick = ()=> board.position(virtual.fen());

        document.getElementById("moves").appendChild(div);
    }

    drawChart(labels,vals);
    board.position(virtual.fen());
};

// ---------------- CHART ----------------
function drawChart(l,v){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels:l,
            datasets:[{
                data:v,
                borderColor:"#2ea44f",
                fill:true,
                backgroundColor:"rgba(46,164,79,0.1)",
                tension:0.25
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{x:{display:false}, y:{min:-5,max:5}}
        }
    });
}

// ---------------- BOARD ----------------
board = Chessboard("board",{
    position:"start",
    pieceTheme:"https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png"
});

initEngine();
</script>

</body>
</html>
